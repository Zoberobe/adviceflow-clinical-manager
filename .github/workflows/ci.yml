name: AdviceFlow CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-security-and-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4
      
    - name: Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar Dependências do Django
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Executar Pytest (Auditoria Lógica)
      env:
        SECRET_KEY: "chave-falsa-apenas-para-o-github-actions"
        DEBUG: "True"
      run: |
        pytest

  frontend-build-verification:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4
      
    - name: Configurar Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Instalar Dependências do React (NPM)
      run: npm install
      npm: install @rollup/rollup-linux-x64-gnu --no-save
      
    - name: Verificar Compilação (Build)
      run: npm run build